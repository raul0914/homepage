<svg viewBox="0 0 75 55" xmlns="http://www.w3.org/2000/svg">
<!-- ろうむねこ - すやすや寝ているポーズ（横向き） -->
<!-- 体 -->
<ellipse cx="40" cy="38" rx="22" ry="14" fill="#f0e8e0"/>
<ellipse cx="40" cy="38" rx="20" ry="12" fill="#f8f2ec"/>

<!-- エプロン -->
<path d="M22 34 Q22 48 34 49 L50 49 Q58 48 58 40 L58 34" fill="#3a6a20"/>
<rect x="22" y="38" width="36" height="2" rx="1" fill="#ff8fa0"/>

<!-- 尻尾 -->
<path d="M58 38 Q68 32 66 24 Q65 20 62 23 Q60 28 58 34Z" fill="#f0e8e0"/>
<path d="M58 36 Q65 32 64 26 Q63 23 61 25 Q59 29 58 34Z" fill="#f8f2ec"/>

<!-- 左耳 -->
<path d="M14 22 L6 6 Q5 3 9 5 L18 14Z" fill="#f0e8e0"/>
<path d="M15 21 L8 8 Q7 6 10 7 L17 15Z" fill="#f8f2ec"/>
<!-- 花 -->
<g transform="translate(5,4) scale(0.45)">
  <circle cx="0" cy="0" r="4" fill="#ff8fa0"/>
  <circle cx="0" cy="-3" r="2" fill="#ffaab8"/>
  <circle cx="3" cy="-1" r="2" fill="#ffaab8"/>
  <circle cx="2" cy="2.5" r="2" fill="#ffaab8"/>
  <circle cx="-2" cy="2.5" r="2" fill="#ffaab8"/>
  <circle cx="-3" cy="-1" r="2" fill="#ffaab8"/>
  <circle cx="0" cy="0" r="2" fill="#f0d060"/>
</g>

<!-- 右耳 -->
<path d="M38 20 L42 4 Q43 1 40 4 L34 14Z" fill="#f0e8e0"/>
<path d="M37 19 L41 6 Q42 4 39 6 L35 15Z" fill="#f8f2ec"/>

<!-- 頭 -->
<ellipse cx="24" cy="26" rx="18" ry="16" fill="#f0e8e0"/>
<ellipse cx="24" cy="26" rx="16" ry="14" fill="#f8f2ec"/>

<!-- 前髪 -->
<path d="M9 23 Q11 17 17 15 Q20 14 22 16 Q23 13 24 12 Q25 13 26 16 Q28 14 32 15 Q38 17 40 23" fill="#f8f2ec" stroke="#e8d8c8" stroke-width="0.2"/>

<!-- 目（閉じている - 寝ている） -->
<path d="M16 25 Q20 27 24 25" stroke="#5a4030" stroke-width="0.8" fill="none" stroke-linecap="round"/>
<path d="M26 25 Q30 27 34 25" stroke="#5a4030" stroke-width="0.8" fill="none" stroke-linecap="round"/>

<!-- まつ毛 -->
<g stroke="#5a4030" stroke-width="0.5" stroke-linecap="round" fill="none">
  <path d="M16 25 Q14 23 13 22"/>
  <path d="M34 25 Q36 23 37 22"/>
</g>

<!-- 鼻 -->
<ellipse cx="25" cy="29" rx="1.8" ry="1.2" fill="#ffa0b0"/>

<!-- ほっぺ -->
<ellipse cx="15" cy="31" rx="3" ry="1.8" fill="#ffc0cb" opacity="0.35"/>
<ellipse cx="35" cy="31" rx="3" ry="1.8" fill="#ffc0cb" opacity="0.35"/>

<!-- 口（すやすや） -->
<path d="M23 32 Q25 34 27 32" stroke="#c0908a" stroke-width="0.6" fill="none" stroke-linecap="round"/>

<!-- ひげ -->
<g stroke="#d0c0b0" stroke-width="0.25" stroke-linecap="round">
  <line x1="5" y1="26" x2="14" y2="28"/>
  <line x1="6" y1="30" x2="15" y2="30"/>
  <line x1="43" y1="26" x2="34" y2="28"/>
  <line x1="42" y1="30" x2="33" y2="30"/>
</g>

<!-- 前足（丸めている） -->
<ellipse cx="18" cy="40" rx="4" ry="5" fill="#f0e8e0"/>
<ellipse cx="18" cy="40" rx="3" ry="4" fill="#f8f2ec"/>

<!-- ZZZ -->
<g fill="#ff8fa0" font-family="sans-serif" font-weight="bold" opacity="0.6">
  <text x="38" y="14" font-size="7">Z</text>
  <text x="44" y="9" font-size="9">Z</text>
  <text x="52" y="3" font-size="11">Z</text>
</g>
</svg>
