<ellipse cx="37" cy="31" rx="5" ry="5.5" fill="white" stroke="#c0a888" stroke-width="0.4"/>
<ellipse cx="24" cy="29" rx="3" ry="3.5" fill="#2d5016"/>
<ellipse cx="38" cy="29" rx="3" ry="3.5" fill="#2d5016"/>
<circle cx="26" cy="27" r="1.5" fill="white"/>
<circle cx="40" cy="27" r="1.5" fill="white"/>

<!-- まつ毛 -->
<g stroke="#5a4030" stroke-width="0.6" stroke-linecap="round" fill="none">
  <path d="M18 28 Q17 25 16 24"/>
  <path d="M42 28 Q43 25 44 24"/>
</g>

<!-- 鼻 -->
<ellipse cx="30" cy="37" rx="2" ry="1.5" fill="#ffa0b0"/>

<!-- ほっぺ -->
<ellipse cx="18" cy="39" rx="3.5" ry="2" fill="#ffc0cb" opacity="0.35"/>
<ellipse cx="42" cy="39" rx="3.5" ry="2" fill="#ffc0cb" opacity="0.35"/>

<!-- 口（ちょっと考え中） -->
<path d="M28 41 Q30 42 32 41" stroke="#c0908a" stroke-width="0.8" fill="none" stroke-linecap="round"/>

<!-- ひげ -->
<g stroke="#d0c0b0" stroke-width="0.3" stroke-linecap="round">
  <line x1="8" y1="34" x2="19" y2="36"/>
  <line x1="9" y1="38" x2="20" y2="38"/>
  <line x1="52" y1="34" x2="41" y2="36"/>
  <line x1="51" y1="38" x2="40" y2="38"/>
</g>

<!-- 右手（あごに手を当てる） -->
<ellipse cx="44" cy="44" rx="5" ry="5" fill="#f0e8e0"/>
<ellipse cx="44" cy="44" rx="4" ry="4" fill="#f8f2ec"/>

<!-- 左手 -->
<ellipse cx="12" cy="58" rx="5" ry="6" fill="#f0e8e0"/>
