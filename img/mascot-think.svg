<ellipse cx="30" cy="34" rx="22" ry="20" fill="#f0e8e0"/>
<ellipse cx="30" cy="34" rx="20" ry="18" fill="#f8f2ec"/>

<!-- 前髪 -->
<path d="M11 30 Q14 22 22 20 Q26 19 28 22 Q29 18 30 17 Q31 18 32 22 Q34 19 38 20 Q46 22 49 30" fill="#f8f2ec" stroke="#e8d8c8" stroke-width="0.3"/>

<!-- 目（考え中 - 上を見ている） -->
