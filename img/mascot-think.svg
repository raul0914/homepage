</g>

<!-- 右耳 -->
<path d="M46 30 L52 12 Q53 9 49 11 L40 22Z" fill="#f0e8e0"/>
<path d="M45 29 L51 14 Q52 12 48 13 L41 23Z" fill="#f8f2ec"/>

