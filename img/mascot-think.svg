<ellipse cx="30" cy="62" rx="20" ry="16" fill="#f0e8e0"/>
<ellipse cx="30" cy="62" rx="18" ry="14" fill="#f8f2ec"/>

<!-- エプロン -->
<path d="M14 57 L14 74 Q14 78 22 79 L38 79 Q46 78 46 74 L46 57" fill="#3a6a20"/>
<rect x="14" y="65" width="32" height="2.5" rx="1" fill="#ff8fa0"/>

